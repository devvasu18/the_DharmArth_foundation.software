name: iOS Build (Unsigned IPA)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
          
      - name: Install Dependencies
        working-directory: ./mobile
        run: npm install --legacy-peer-deps
        
      - name: Prebuild iOS
        working-directory: ./mobile
        run: npx expo prebuild --platform ios
        
      - name: Install CocoaPods
        working-directory: ./mobile/ios
        run: pod install
        
      - name: Build iOS App
        working-directory: ./mobile/ios
        run: |
          WORKSPACE=$(ls | grep \.xcworkspace$ | head -n 1)
          # The main app scheme is always the same name as the workspace (without the .xcworkspace extension)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace $WORKSPACE with scheme $SCHEME"
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
            
      - name: Package Unsigned IPA
        working-directory: ./mobile/ios
        run: |
          mkdir -p Payload
          # Find the .app directory wherever xcodebuild decided to put it
          APP_PATH=$(find build/Build/Products -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found! Let's see what was built:"
            ls -R build/Build/Products
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mv "$APP_PATH" Payload/
          zip -r app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: dharmarth-foundation-unsigned-ipa
          path: mobile/ios/app.ipa
