name: Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Dependencies
        working-directory: ./mobile
        run: npm install --legacy-peer-deps
        
      - name: Prebuild Android
        working-directory: ./mobile
        run: npx expo prebuild --platform android
        
      - name: Fix Maven Central 403 (Remove Foojay Plugin)
        working-directory: ./mobile/android
        run: sed -i '/foojay-resolver-convention/d' settings.gradle
        
      - name: Create Assets Directory
        working-directory: ./mobile/android/app/src/main
        run: mkdir -p assets

      - name: Bundle JS Assets
        working-directory: ./mobile
        run: npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Build APK (Debug)
        working-directory: ./mobile/android
        run: ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dharmarth-foundation-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
